name: Test macOS Universal Build

# This workflow only runs in YOUR fork
# It won't affect Seth's repository

on:
  workflow_dispatch:
  push:
    branches:
      - 'test_mac_arm64'

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-universal:
    name: Build Universal Binary (arm64 + x86_64)
    runs-on: macos-14  # Apple Silicon runner — cross-compiles both arm64 and x86_64
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Proton SDK
        run: |
          cd ..
          git clone https://github.com/mateusbentes/proton.git
          ln -s proton/shared shared
          echo "Verifying shared directory is accessible from RTDink/OSX:"
          cd RTDink/OSX
          ls -la ../../shared/ | head -5

      - name: Create missing game directory
        run: |
          mkdir -p bin/game
          echo "Placeholder for game assets" > bin/game/README.txt

      - name: System Info
        run: |
          echo "Architecture: $(uname -m)"
          echo "macOS Version: $(sw_vers -productVersion)"
          xcodebuild -version

      - name: Install SDL2 universal frameworks
        run: |
          mkdir -p ~/Library/Frameworks

          # SDL2 universal framework (arm64 + x86_64)
          curl -L -o /tmp/SDL2.dmg "https://github.com/libsdl-org/SDL/releases/download/release-2.30.9/SDL2-2.30.9.dmg"
          hdiutil attach /tmp/SDL2.dmg -mountpoint /Volumes/SDL2
          cp -r /Volumes/SDL2/SDL2.framework ~/Library/Frameworks/
          hdiutil detach /Volumes/SDL2

          # SDL2_mixer universal framework (arm64 + x86_64)
          curl -L -o /tmp/SDL2_mixer.dmg "https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.0/SDL2_mixer-2.8.0.dmg"
          hdiutil attach /tmp/SDL2_mixer.dmg -mountpoint /Volumes/SDL2_mixer
          cp -r /Volumes/SDL2_mixer/SDL2_mixer.framework ~/Library/Frameworks/
          hdiutil detach /Volumes/SDL2_mixer

          echo "Verifying frameworks are universal:"
          lipo -info ~/Library/Frameworks/SDL2.framework/SDL2
          lipo -info ~/Library/Frameworks/SDL2_mixer.framework/SDL2_mixer

      - name: Generate pnglibconf.h
        run: |
          LIBPNG=../shared/Irrlicht/source/Irrlicht/libpng
          cp "$LIBPNG/pnglibconf.h.prebuilt" "$LIBPNG/pnglibconf.h"

      - name: Build Universal Binary
        run: |
          cd OSX
          SDL2_FRAMEWORK="$HOME/Library/Frameworks/SDL2.framework"
          SDL2_MIXER_FRAMEWORK="$HOME/Library/Frameworks/SDL2_mixer.framework"
          set -o pipefail
          xcodebuild -project RTDink.xcodeproj \
            -configuration Release \
            -arch arm64 -arch x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            FRAMEWORK_SEARCH_PATHS="$HOME/Library/Frameworks" \
            OTHER_LDFLAGS="-framework SDL2 -framework SDL2_mixer -rpath $HOME/Library/Frameworks" \
            OTHER_CFLAGS="-F$HOME/Library/Frameworks -DGL_SILENCE_DEPRECATION" \
            build 2>&1 | tee /tmp/xcodebuild.log; \
          EXIT=${PIPESTATUS[0]}; \
          if [ $EXIT -ne 0 ]; then \
            echo "=== BUILD ERRORS ==="; \
            grep -E "error:|undefined symbol|duplicate symbol|ld:" /tmp/xcodebuild.log | head -80; \
            exit $EXIT; \
          fi

      - name: Embed SDL2 frameworks into app bundle
        run: |
          cd OSX
          APP=$(find build -name "*.app" -type d | head -1)
          echo "App bundle: $APP"
          mkdir -p "$APP/Contents/Frameworks"
          cp -r ~/Library/Frameworks/SDL2.framework "$APP/Contents/Frameworks/"
          cp -r ~/Library/Frameworks/SDL2_mixer.framework "$APP/Contents/Frameworks/"

          BINARY="$APP/Contents/MacOS/$(basename "$APP" .app)"
          echo "=== Current load commands ==="
          otool -L "$BINARY"

          # Rewrite all SDL library references to use bundle-relative path
          # This works regardless of what rpath was set at build time
          for ARCH in x86_64 arm64; do
            SDL2_PATH=$(otool -arch $ARCH -L "$BINARY" 2>/dev/null | grep SDL2.framework/Versions | grep -v SDL2_mixer | awk '{print $1}' | head -1)
            SDL2_MIXER_PATH=$(otool -arch $ARCH -L "$BINARY" 2>/dev/null | grep SDL2_mixer.framework/Versions | awk '{print $1}' | head -1)
            echo "[$ARCH] SDL2: $SDL2_PATH"
            echo "[$ARCH] SDL2_mixer: $SDL2_MIXER_PATH"
          done

          SDL2_PATH=$(otool -L "$BINARY" | grep SDL2.framework/Versions | grep -v SDL2_mixer | awk '{print $1}' | head -1)
          SDL2_MIXER_PATH=$(otool -L "$BINARY" | grep SDL2_mixer.framework/Versions | awk '{print $1}' | head -1)

          if [ -n "$SDL2_PATH" ]; then
            install_name_tool -change "$SDL2_PATH" "@executable_path/../Frameworks/SDL2.framework/Versions/A/SDL2" "$BINARY"
            echo "Fixed SDL2: $SDL2_PATH -> @executable_path/../Frameworks/SDL2.framework/Versions/A/SDL2"
          fi
          if [ -n "$SDL2_MIXER_PATH" ]; then
            install_name_tool -change "$SDL2_MIXER_PATH" "@executable_path/../Frameworks/SDL2_mixer.framework/Versions/A/SDL2_mixer" "$BINARY"
            echo "Fixed SDL2_mixer: $SDL2_MIXER_PATH -> @executable_path/../Frameworks/SDL2_mixer.framework/Versions/A/SDL2_mixer"
          fi

          echo "=== Fixed load commands ==="
          otool -L "$BINARY"
          echo "Frameworks embedded."

      - name: Verify game data is bundled
        run: |
          cd OSX
          APP=$(find build -name "*.app" -type d | head -1)
          echo "Checking bundle contents:"
          ls "$APP/Contents/Resources/" | head -20
          if [ -d "$APP/Contents/Resources/dink" ]; then
            echo "✅ dink/ game data is bundled"
          else
            echo "❌ dink/ game data is MISSING from bundle"
            exit 1
          fi
          if [ -d "$APP/Contents/Resources/interface" ]; then
            echo "✅ interface/ is bundled"
          else
            echo "❌ interface/ is MISSING"
          fi
          if [ -d "$APP/Contents/Resources/audio" ]; then
            echo "✅ audio/ is bundled"
          else
            echo "❌ audio/ is MISSING"
          fi

      - name: Check Binary Architecture
        run: |
          cd OSX
          APP=$(find build -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            BINARY="$APP/Contents/MacOS/$(basename "$APP" .app)"
            if [ -f "$BINARY" ]; then
              echo "Binary found: $BINARY"
              file "$BINARY"
              lipo -info "$BINARY"
            fi
          fi

      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RTDink-macOS-Universal
          path: OSX/build/Release/*.app
          retention-days: 7
