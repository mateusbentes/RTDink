name: Test macOS Universal Build

# This workflow only runs in YOUR fork
# It won't affect Seth's repository

on:
  workflow_dispatch:
  push:
    branches:
      - 'test_mac_arm64'

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-universal:
    name: Build Universal Binary (arm64 + x86_64)
    runs-on: macos-14  # Apple Silicon runner — cross-compiles both arm64 and x86_64
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Proton SDK
        run: |
          cd ..
          git clone https://github.com/SethRobinson/proton.git
          ln -s proton/shared shared
          echo "Verifying shared directory is accessible from RTDink/OSX:"
          cd RTDink/OSX
          ls -la ../../shared/ | head -5

      - name: Create missing game directory
        run: |
          mkdir -p bin/game
          echo "Placeholder for game assets" > bin/game/README.txt

      - name: System Info
        run: |
          echo "Architecture: $(uname -m)"
          echo "macOS Version: $(sw_vers -productVersion)"
          xcodebuild -version

      - name: Install SDL2
        run: |
          brew install sdl2 sdl2_mixer
          echo "SDL2 prefix: $(brew --prefix sdl2)"
          echo "SDL2_mixer prefix: $(brew --prefix sdl2_mixer)"

      - name: Generate pnglibconf.h
        run: |
          LIBPNG=../shared/Irrlicht/source/Irrlicht/libpng
          cp "$LIBPNG/pnglibconf.h.prebuilt" "$LIBPNG/pnglibconf.h"

      - name: Build Universal Binary
        run: |
          cd OSX
          SDL2_PREFIX=$(brew --prefix sdl2)
          SDL2_MIXER_PREFIX=$(brew --prefix sdl2_mixer)
          set -o pipefail
          xcodebuild -project RTDink.xcodeproj \
            -configuration Release \
            -arch arm64 -arch x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            FRAMEWORK_SEARCH_PATHS="" \
            OTHER_LDFLAGS="-lSDL2 -lSDL2_mixer" \
            OTHER_CFLAGS="-I$SDL2_PREFIX/include/SDL2 -I$SDL2_MIXER_PREFIX/include/SDL2 -DGL_SILENCE_DEPRECATION" \
            LIBRARY_SEARCH_PATHS="$SDL2_PREFIX/lib $SDL2_MIXER_PREFIX/lib /opt/homebrew/lib /usr/local/lib" \
            build 2>&1 | tee /tmp/xcodebuild.log; \
          EXIT=${PIPESTATUS[0]}; \
          if [ $EXIT -ne 0 ]; then \
            echo "=== BUILD ERRORS ==="; \
            grep -E "error:|undefined symbol|duplicate symbol|ld:" /tmp/xcodebuild.log | head -80; \
            exit $EXIT; \
          fi

      - name: Check Binary Architecture
        run: |
          cd OSX
          APP=$(find build -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            BINARY="$APP/Contents/MacOS/$(basename "$APP" .app)"
            if [ -f "$BINARY" ]; then
              echo "Binary found: $BINARY"
              file "$BINARY"
              lipo -info "$BINARY"
            fi
          fi

      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RTDink-macOS-Universal
          path: OSX/build/Release/*.app
          retention-days: 7
