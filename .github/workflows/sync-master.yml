name: Sync master (no workflow)

on:
  push:
    branches:
      - test_mac_arm64
    paths-ignore:
      - '.github/**'

jobs:
  sync-master:
    name: Sync changes to master (excluding .github)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test_mac_arm64
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync to master without .github
        run: |
          git checkout master
          # Checkout every file from test_mac_arm64 except .github/
          git checkout test_mac_arm64 -- $(git ls-tree -r --name-only test_mac_arm64 | grep -v '^\.github')
          # If nothing changed, exit cleanly
          if git diff --cached --quiet; then
            echo "master already up to date"
            exit 0
          fi
          git commit -m "chore: sync master from test_mac_arm64 [skip ci]"
          git push origin master
